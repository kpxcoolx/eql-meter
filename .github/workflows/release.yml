name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  resolve:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Resolve version tag
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            args: --bundles nsis
          - platform: macos-latest
            args: --bundles dmg,app
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      # Always create a DRAFT first. Publishing happens only after we verify
      # Windows + macOS installers and latest.json exist — never leave a broken "Latest".
      - name: Build installer (draft release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.resolve.outputs.tag }}
          releaseName: EQL Meter ${{ needs.resolve.outputs.tag }}
          releaseBody: |
            Installers for EQL Meter (Windows + macOS).

            **Windows:** run the NSIS `.exe` (current-user install; no admin required).
            **Mac:** open the `.dmg`, drag EQL Meter to Applications. If Gatekeeper blocks the first open:
            `xattr -dr com.apple.quarantine "/Applications/EQL Meter.app"`

            1. Start EQL Meter → **Auto-detect** / **Choose log…**
            2. On Mac with osxEQL, Auto-detect finds the Wine log under Application Support.
            3. Open **Overlay** and enable click-through.

            After this build, use **Menu → Check for updates** for future releases.

            Guides: docs/windows.md · docs/mac.md · docs/mac-parallels.md
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: ${{ matrix.args }}

  publish:
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - name: Publish only if updater assets are complete
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
          TAG: ${{ needs.resolve.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Checking assets on $TAG…"
          assets="$(gh release view "$TAG" --json assets --jq '[.assets[].name] | join("\n")')"
          echo "$assets"
          echo "$assets" | grep -E 'setup\.exe$' >/dev/null
          echo "$assets" | grep -E 'setup\.exe\.sig$' >/dev/null
          echo "$assets" | grep -E '\.dmg$' >/dev/null
          echo "$assets" | grep -x 'latest.json' >/dev/null
          gh release edit "$TAG" --draft=false
          echo "Published $TAG"
          curl -fsSL "https://github.com/${{ github.repository }}/releases/latest/download/latest.json" \
            | python3 -c "import sys,json; d=json.load(sys.stdin); print('updater feed version:', d.get('version'))"
