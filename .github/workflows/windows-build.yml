name: windows-build

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version tag (e.g. v0.1.0)"
        required: true
        default: "v0.1.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version tag
        id: ver
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "tag=${{ inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend deps
        run: npm ci

      # Always create a DRAFT first. Publishing happens only after we verify
      # the NSIS installer + latest.json exist — never leave a broken "Latest".
      - name: Build Windows installer (draft release)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.ver.outputs.tag }}
          releaseName: EQL Meter ${{ steps.ver.outputs.tag }}
          releaseBody: |
            Windows installer for EQL Meter.

            1. Run the NSIS `.exe` (current-user install; no admin required).
            2. Start EQL Meter → **Auto-detect** / **Choose log…**.
            3. Open **Overlay** and enable click-through.

            After this build, use **Menu → Check for updates** for future releases.

            Full guide: docs/windows.md
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true
          updaterJsonPreferNsis: true
          args: --bundles nsis

      - name: Publish only if updater assets are complete
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ steps.ver.outputs.tag }}
        run: |
          set -euo pipefail
          echo "Checking assets on $TAG…"
          assets="$(gh release view "$TAG" --json assets --jq '[.assets[].name] | join("\n")')"
          echo "$assets"
          echo "$assets" | grep -E 'setup\.exe$' >/dev/null
          echo "$assets" | grep -E 'setup\.exe\.sig$' >/dev/null
          echo "$assets" | grep -x 'latest.json' >/dev/null
          gh release edit "$TAG" --draft=false
          echo "Published $TAG"
          curl -fsSL "https://github.com/${{ github.repository }}/releases/latest/download/latest.json" \
            | python -c "import sys,json; d=json.load(sys.stdin); print('updater feed version:', d.get('version'))"
